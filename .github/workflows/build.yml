name: Build
on:
    workflow_dispatch:
jobs:
    show-matrix:
        name: Show matrix

        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target:
                          - aarch64-unknown-linux-gnu
                          - aarch64-unknown-linux-musl
                          - x86_64-unknown-linux-gnu
                          - x86_64-unknown-linux-musl

                    - os: macos-latest
                      target:
                          - aarch64-apple-darwin

                    - os: windows-latest
                      target:
                          - aarch64-pc-windows-msvc
                          - x86_64-pc-windows-msvc

        runs-on: ${{ matrix.os }}
        steps:
            - run: 'echo "Target platform: ${{ matrix.target }}"'
            - run: 'echo "Operating system: ${{ matrix.os }}"'

            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Release build
              run: cargo build --release --target ${{ matrix.target }} -Z unstable-options --artifact-path target/artifacts/${{ matrix.target }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.target }}
                  path: target/artifacts/${{ matrix.target }}
                  retention-days: 1
